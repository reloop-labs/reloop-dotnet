name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: meta
        shell: bash
        run: |
          VERSION=$(grep -m1 '<Version>' Reloop.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=reloop-dotnet-$VERSION-source.zip" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Reloop.csproj
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.meta.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match Reloop.csproj version $PKG_VERSION"
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test and pack
        run: |
          dotnet test tests/Reloop.Tests/Reloop.Tests.csproj
          dotnet pack Reloop.csproj --configuration Release --output ./artifacts

      - name: Create source archive
        run: |
          zip -r "${{ steps.meta.outputs.archive }}" . \
            -x '*.git*' 'artifacts/*' '**/bin/*' '**/obj/*' '.github/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Reloop .NET SDK ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.archive }}
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
